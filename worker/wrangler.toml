name = "mainfeed-api"
main = "src/index.js"
compatibility_date = "2026-05-23"

# Custom domain: api.mainfeed.app
routes = [
  { pattern = "api.mainfeed.app", custom_domain = true }
]

# D1
[[d1_databases]]
binding = "DB"
database_name = "mainfeed-db"
database_id = "5f06a541-3be5-4ffc-9fd5-b56ea239192c"

# R2 buckets
[[r2_buckets]]
binding = "CONTENT"
bucket_name = "mainfeed-content"

[[r2_buckets]]
binding = "SELFIES"
bucket_name = "mainfeed-selfies"

[[r2_buckets]]
binding = "STOCK"
bucket_name = "mainfeed-stock"

# Workers AI (Llama 3.1 for captions, Flux Schnell for images)
[ai]
binding = "AI"

# Secrets (set via `wrangler secret put NAME`):
#   FAL_API_KEY          — Fal.ai image/video generation
#   PERSONA_API_KEY      — Persona liveness verification
#   ADMIN_TOKEN          — admin/takedown endpoints
#   PADDLE_API_KEY       — payment processor (set when monetization lands)
#   PADDLE_WEBHOOK_SECRET — payment webhook verification

[vars]
ENVIRONMENT = "production"
