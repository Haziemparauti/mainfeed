<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0e" />
  <title>Mainfeed</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-square2.svg?v=5" />
  <link rel="stylesheet" href="/assets/css/style.css?v=6" />
  <meta property="og:type" content="profile" />
  <meta property="og:site_name" content="Mainfeed" />
</head>
<body class="mf-profile">

  <header class="mf-app-header">
    <a href="/" class="mf-brand">
      <img src="/assets/img/logo-square2.svg?v=5" alt="" class="mf-brand-icon" width="32" height="32" />
      <img src="/assets/img/logo-rect2.svg?v=5" alt="Mainfeed" class="mf-brand-mark" />
    </a>
    <a href="/signup.html" class="mf-profile-cta-pill">Make yours</a>
  </header>

  <main class="mf-profile-main">

    <section class="mf-profile-hero" id="mf-profile-hero">
      <!-- Filled by JS -->
    </section>

    <section class="mf-feed" id="mf-public-feed">
      <!-- Filled by JS — public pieces appear here -->
    </section>

    <section class="mf-profile-footer">
      <h2 class="mf-profile-cta-h">your media. not social media.</h2>
      <p class="mf-profile-cta-p">AI makes a personal feed about you. Only you see the full thing. Share what you want, keep the rest private.</p>
      <a href="/signup.html" class="mf-cta mf-cta-block">Make your own Mainfeed</a>
    </section>

  </main>

  <script src="/assets/js/profile.js?v=6" type="module"></script>
</body>
</html>
