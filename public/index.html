<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0e" />
  <title>Mainfeed — Your media. Not social media.</title>
  <meta name="description" content="The platform where AI makes content about you, for you. No friends required. No validation needed. Just you, your thoughts, and your media." />

  <meta property="og:title" content="Mainfeed — Your media. Not social media." />
  <meta property="og:description" content="AI makes content about you, for you. No friends required." />
  <meta property="og:type" content="website" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-square.svg?v=2" />

  <link rel="stylesheet" href="/assets/css/style.css?v=2" />

<body class="mf-home">

  <section class="mf-vhero">
    <video class="mf-vhero-bg" autoplay muted loop playsinline preload="auto" disablepictureinpicture>
      <source src="/assets/video/hero.mp4?v=2" type="video/mp4" />
    </video>
    <div class="mf-vhero-overlay"></div>

    <header class="mf-vhero-nav">
      <a href="/" class="mf-brand">
        <img src="/assets/img/logo-square.svg?v=2" alt="" class="mf-brand-icon" width="36" height="36" />
        <img src="/assets/img/logo-rect2.svg?v=2" alt="Mainfeed" class="mf-brand-mark" />
      </a>
      <button class="mf-menu-btn" aria-label="Open menu" id="mf-menu-toggle">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="mf-vhero-content">
      <h1 class="mf-vhero-h">
        Your media.<br/>Not social media.
      </h1>
      <p class="mf-vhero-p">
        Only you see this content. All about you. Nobody else &mdash; unless you choose to share it.
      </p>
    </div>

    <div class="mf-vhero-actions">
      <a href="/signup.html" class="mf-cta mf-cta-block">Sign up</a>
      <a href="/login.html" class="mf-vhero-secondary">Log in</a>
      <p class="mf-vhero-legal">
        By continuing you accept our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy</a>.
      </p>
    </div>
  </section>

  <nav class="mf-menu" id="mf-menu" hidden aria-label="Site menu">
    <div class="mf-menu-head">
      <a href="/" class="mf-brand">
        <img src="/assets/img/logo-square.svg?v=2" alt="" class="mf-brand-icon" width="36" height="36" />
        <img src="/assets/img/logo-rect2.svg?v=2" alt="Mainfeed" class="mf-brand-mark" />
      </a>
      <button class="mf-menu-close" aria-label="Close menu" id="mf-menu-close">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <ul class="mf-menu-list">
      <li><a href="/signup.html">Sign up</a></li>
      <li><a href="/login.html">Log in</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
    </ul>

  <script src="/assets/js/main.js?v=2" type="module"></script>
