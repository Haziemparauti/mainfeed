<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0e" />
  <title>Sign up — Mainfeed</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-square2.svg?v=7" />
  <link rel="stylesheet" href="/assets/css/style.css?v=7" />
</head>
<body class="mf-auth">

  <header class="mf-nav">
    <button class="mf-back" type="button" aria-label="Go back" onclick="history.length>1?history.back():location.href='/'">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"></polyline></svg>
    </button>
    <a href="/" class="mf-brand">
      <img src="/assets/img/logo-square2.svg?v=7" alt="" class="mf-brand-icon" width="36" height="36" />
      <img src="/assets/img/logo-rect2.svg?v=7" alt="Mainfeed" class="mf-brand-mark" />
    </a>
  </header>

  <main class="mf-form-wrap">
    <form id="mf-signup-form" enctype="multipart/form-data">

      <section class="mf-step">
        <h1>Create your Mainfeed</h1>
        <p class="mf-sub">One screen. Takes under a minute.</p>

        <label class="mf-field">
          <span class="mf-prefix">mainfeed.app/@</span>
          <input type="text" id="mf-handle" name="handle" placeholder="yourname"
                 autocomplete="off" maxlength="20" required
                 pattern="[a-z0-9]{2,20}" inputmode="text" />
        </label>

        <label class="mf-field">
          <input type="email" id="mf-email" name="email" placeholder="Email address"
                 autocomplete="email" required />
        </label>

        <label class="mf-field">
          <input type="password" id="mf-password" name="password" placeholder="Password (8+ characters)"
                 minlength="8" autocomplete="new-password" required />
        </label>

        <fieldset class="mf-field mf-radio-group">
          <legend class="mf-sub">You appear as</legend>
          <label class="mf-radio">
            <input type="radio" name="gender" value="m" required />
            <span>male</span>
          </label>
          <label class="mf-radio">
            <input type="radio" name="gender" value="f" required />
            <span>female</span>
          </label>
        </fieldset>

        <label class="mf-field">
          <span class="mf-sub">A selfie of you (front-facing, clear lighting)</span>
          <input type="file" id="mf-selfie-0" name="selfie_0" accept="image/*" required />
        </label>

        <label class="mf-check">
          <input type="checkbox" id="mf-consent-age" name="consent_age" value="true" required />
          <span>I'm 18 or older.</span>
        </label>
        <label class="mf-check">
          <input type="checkbox" id="mf-consent-terms" name="consent_terms" value="true" required />
          <span>I agree to the <a href="/terms.html">Terms</a> (AI generation of my likeness in my private feed) and <a href="/privacy.html">Privacy</a>.</span>
        </label>

        <p id="mf-err" class="mf-err" hidden></p>

        <button id="mf-submit" class="mf-cta mf-cta-block" type="submit">Create my Mainfeed</button>
        <p class="mf-sub" style="text-align:center;margin-top:1rem;">
          Already have an account? <a href="/login.html">Log in</a>
        </p>
      </section>

    </form>
  </main>

  <script type="module">
    const API = location.hostname === 'localhost' ? 'http://localhost:8787' : 'https://api.mainfeed.app';
    const form = document.getElementById('mf-signup-form');
    const submitBtn = document.getElementById('mf-submit');
    const errEl = document.getElementById('mf-err');

    function showErr(msg) {
      errEl.hidden = false;
      errEl.textContent = msg;
    }
    function clearErr() {
      errEl.hidden = true;
      errEl.textContent = '';
    }

    const ERR = {
      invalid_handle: 'Handle must be 2-20 lowercase letters/numbers.',
      reserved_handle: "That handle is reserved. Pick another.",
      invalid_email: 'That email looks off.',
      weak_password: 'Password must be at least 8 characters.',
      invalid_gender: 'Pick male or female.',
      consent_required: 'You need to confirm the age + Terms boxes.',
      need_at_least_one_selfie: 'Add a selfie before continuing.',
      invalid_image_type: 'That file is not a supported image.',
      selfie_too_large: 'Selfie too large (max 8 MB).',
      handle_or_email_taken: 'That handle or email is already in use.',
      rate_limited: 'Slow down — too many signups from this IP.',
      user_cap_reached: 'We are full while testing. Try again later.',
      expected_multipart: 'Bad form submission — try refreshing.',
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErr();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating your Mainfeed...';
      try {
        const fd = new FormData(form);
        // Checkboxes: only submit 'true' when checked (HTML default doesn't help here)
        fd.set('consent_age',   document.getElementById('mf-consent-age').checked   ? 'true' : 'false');
        fd.set('consent_terms', document.getElementById('mf-consent-terms').checked ? 'true' : 'false');

        const res = await fetch(`${API}/api/signup`, {
          method: 'POST',
          body: fd,
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showErr(ERR[data.error] || `Signup failed (${data.error || res.status})`);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create my Mainfeed';
          return;
        }
        // Logged in — go to feed
        location.href = '/app.html';
      } catch (err) {
        showErr('Network error. Check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create my Mainfeed';
      }
    });
  </script>
</body>
</html>
