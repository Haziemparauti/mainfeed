<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0e" />
  <title>Mainfeed</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-square2.svg?v=7" />
  <link rel="stylesheet" href="/assets/css/style.css?v=7" />
</head>
<body class="mf-app">

  <header class="mf-app-header">
    <a href="/app.html" class="mf-brand">
      <img src="/assets/img/logo-square2.svg?v=7" alt="" class="mf-brand-icon" width="32" height="32" />
      <img src="/assets/img/logo-rect2.svg?v=7" alt="Mainfeed" class="mf-brand-mark" />
    </a>
    <button class="mf-avatar" id="mf-app-menu-toggle" aria-label="Open menu" type="button">
      <span id="mf-avatar-initial">?</span>
    </button>
  </header>

  <nav class="mf-menu" id="mf-app-menu" hidden aria-label="Account menu">
    <div class="mf-menu-head">
      <div class="mf-app-menu-user">
        <div class="mf-app-menu-avatar"><span id="mf-app-menu-initial">?</span></div>
        <div>
          <div class="mf-app-menu-handle" id="mf-app-menu-handle">@you</div>
          <div class="mf-app-menu-email" id="mf-app-menu-email"></div>
        </div>
      </div>
      <button class="mf-menu-close" aria-label="Close menu" id="mf-app-menu-close" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <ul class="mf-menu-list">
      <li><a href="#" id="mf-menu-public-profile">My public profile</a></li>
      <li><a href="#" id="mf-menu-logout">Log out</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
    </ul>
  </nav>

  <main class="mf-app-main">

    <section class="mf-feed" id="mf-feed">
      <div class="mf-feed-empty">
        <h2>Your Mainfeed is empty</h2>
        <p>Tell us about your day above and AI will make content about you.</p>
      </div>
    </section>

  </main>

  <script src="/assets/js/app.js?v=7" type="module"></script>
</body>
</html>
