<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0e" />
  <title>Sign up — Mainfeed</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/logo-square2.svg?v=22" />
  <link rel="stylesheet" href="/assets/css/style.css?v=22" />
</head>
<body class="mf-auth">

  <header class="mf-nav">
    <a href="/" class="mf-brand">
      <img src="/assets/img/logo-square2.svg?v=22" alt="" class="mf-brand-icon" width="36" height="36" />
      <img src="/assets/img/logo-rect2.svg?v=22" alt="Mainfeed" class="mf-brand-mark" />
    </a>
  </header>

  <main class="mf-form-wrap">
    <div class="mf-progress" data-step="1">
      <span></span><span></span><span></span>
    </div>

    <form id="mf-signup-form" enctype="multipart/form-data" novalidate>

      <!-- ============ Step 1: account ============ -->
      <section class="mf-step" data-step="1">
        <h1>Create your Mainfeed</h1>
        <p class="mf-sub">Handle, email, password, gender.</p>

        <label class="mf-field">
          <span class="mf-prefix">mainfeed.app/@</span>
          <input type="text" id="mf-handle" name="handle" placeholder="yourname"
                 autocomplete="off" maxlength="20" required
                 pattern="[a-z0-9]{2,20}" inputmode="text" />
        </label>

        <label class="mf-field">
          <input type="email" id="mf-email" name="email" placeholder="Email address"
                 autocomplete="email" required />
        </label>

        <div class="mf-field mf-field-password">
          <input type="password" id="mf-password" name="password" placeholder="Password (8+ characters)"
                 minlength="8" autocomplete="new-password" required />
          <button type="button" class="mf-eye-btn" id="mf-eye-btn" data-state="hidden" aria-label="Show password">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
              <line class="mf-eye-slash" x1="3" y1="3" x2="21" y2="21"/>
            </svg>
          </button>
        </div>

        <div class="mf-gender-group">
          <span class="mf-gender-label">Gender</span>
          <div class="mf-gender-toggle">
            <label class="mf-gender-option">
              <input type="radio" name="gender" value="m" required />
              <span>Male</span>
            </label>
            <label class="mf-gender-option">
              <input type="radio" name="gender" value="f" required />
              <span>Female</span>
            </label>
          </div>
        </div>

        <p class="mf-err" id="mf-err-1" hidden></p>
        <button class="mf-cta mf-cta-block" type="button" data-action="next-1">Continue</button>
      </section>

      <!-- ============ Step 2: 2 selfies (no crop, with face detection) ============ -->
      <section class="mf-step" data-step="2" hidden>
        <h1>Two selfies of you</h1>
        <p class="mf-sub">Front-facing, clear lighting. Whole face visible.</p>

        <div class="mf-selfie-grid">
          <div class="mf-selfie-card" data-slot="0">
            <div class="mf-selfie-stage" data-stage="0">
              <span class="mf-stage-icon">📷</span>
              <span class="mf-selfie-num">1</span>
            </div>
            <div class="mf-selfie-actions" data-actions="0">
              <button type="button" class="mf-btn-action mf-btn-action--primary" data-take="0">
                <span>📷</span> Take photo
              </button>
              <button type="button" class="mf-btn-action" data-upload="0">
                <span>📁</span> Upload
              </button>
              <input type="file" data-camera-input="0" accept="image/*" capture="user" hidden />
              <input type="file" data-upload-input="0" accept="image/*" hidden />
            </div>
            <button type="button" class="mf-link-retake" data-retake="0" hidden>Retake</button>
          </div>

          <div class="mf-selfie-card" data-slot="1">
            <div class="mf-selfie-stage" data-stage="1">
              <span class="mf-stage-icon">📷</span>
              <span class="mf-selfie-num">2</span>
            </div>
            <div class="mf-selfie-actions" data-actions="1">
              <button type="button" class="mf-btn-action mf-btn-action--primary" data-take="1">
                <span>📷</span> Take photo
              </button>
              <button type="button" class="mf-btn-action" data-upload="1">
                <span>📁</span> Upload
              </button>
              <input type="file" data-camera-input="1" accept="image/*" capture="user" hidden />
              <input type="file" data-upload-input="1" accept="image/*" hidden />
            </div>
            <button type="button" class="mf-link-retake" data-retake="1" hidden>Retake</button>
          </div>
        </div>

        <p class="mf-busy" id="mf-busy-2" hidden>Checking for a face…</p>
        <p class="mf-err" id="mf-err-2" hidden></p>
        <button class="mf-cta mf-cta-block" type="button" data-action="next-2">Continue</button>
        <button class="mf-back-bottom" type="button" data-back="1">← Back</button>
      </section>

      <!-- ============ Step 3: consents + submit ============ -->
      <section class="mf-step" data-step="3" hidden>
        <h1>One last thing</h1>
        <p class="mf-sub">Two quick agreements and your Mainfeed goes live.</p>

        <label class="mf-check">
          <input type="checkbox" id="mf-consent-age" required />
          <span>I'm 18 or older.</span>
        </label>
        <label class="mf-check">
          <input type="checkbox" id="mf-consent-terms" required />
          <span>I agree to the <a href="/terms.html">Terms</a> (AI generation of my likeness in my private feed) and <a href="/privacy.html">Privacy</a>.</span>
        </label>

        <p class="mf-err" id="mf-err-3" hidden></p>
        <button id="mf-submit" class="mf-cta mf-cta-block" type="submit">Create my Mainfeed</button>
        <button class="mf-back-bottom" type="button" data-back="2">← Back</button>
      </section>

    </form>

    <!-- ============ Progress screen (replaces form after submit succeeds) ============ -->
    <section class="mf-progress-screen" id="mf-progress-screen" hidden>
      <h1>Creating your Mainfeed</h1>
      <div class="mf-progress-bar">
        <div class="mf-progress-fill" id="mf-progress-fill"></div>
      </div>
      <div class="mf-progress-pct" id="mf-progress-pct">0%</div>
    </section>
  </main>

  <script type="module">
    const API = location.hostname === 'localhost' ? 'http://localhost:8787' : 'https://api.mainfeed.app';
    const form = document.getElementById('mf-signup-form');
    const submitBtn = document.getElementById('mf-submit');
    const progress = document.querySelector('.mf-progress');

    const STEPS = 3;
    let currentStep = 1;
    const captured = { selfie_0: null, selfie_1: null };

    function showStep(step, pushHistory = true) {
      currentStep = step;
      document.querySelectorAll('.mf-step').forEach((s) => {
        s.hidden = Number(s.dataset.step) !== step;
      });
      progress.dataset.step = String(step);
      if (pushHistory) history.pushState({ step }, '', `#step-${step}`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    const hashStep = parseInt((location.hash.match(/^#step-(\d+)/) || [])[1] || '1', 10);
    showStep(Math.max(1, Math.min(STEPS, hashStep)), false);
    history.replaceState({ step: currentStep }, '', `#step-${currentStep}`);
    window.addEventListener('popstate', (e) => showStep((e.state && e.state.step) || 1, false));
    document.querySelectorAll('[data-back]').forEach((b) => b.addEventListener('click', () => showStep(Number(b.dataset.back))));

    // Password show/hide
    const pwInput = document.getElementById('mf-password');
    const eyeBtn = document.getElementById('mf-eye-btn');
    eyeBtn.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      eyeBtn.dataset.state = isText ? 'hidden' : 'visible';
      eyeBtn.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
    });

    function clearErr(step) {
      const el = document.getElementById(`mf-err-${step}`);
      if (el) { el.hidden = true; el.textContent = ''; }
    }
    function showErr(step, msg) {
      const el = document.getElementById(`mf-err-${step}`);
      if (el) { el.hidden = false; el.textContent = msg; }
    }
    function setBusy(step, on, msg) {
      const el = document.getElementById(`mf-busy-${step}`);
      if (!el) return;
      el.hidden = !on;
      if (msg) el.textContent = msg;
    }

    // ============ MediaPipe Face Detector (lazy-loaded) ============
    let _detector = null;
    let _detectorPromise = null;
    async function getDetector() {
      if (_detector) return _detector;
      if (_detectorPromise) return _detectorPromise;
      _detectorPromise = (async () => {
        const mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');
        const { FaceDetector, FilesetResolver } = mod;
        const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
        _detector = await FaceDetector.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
          },
          runningMode: 'IMAGE',
          minDetectionConfidence: 0.5,
        });
        return _detector;
      })();
      return _detectorPromise;
    }

    async function detectFaceInBlob(blob) {
      const url = URL.createObjectURL(blob);
      try {
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload = () => resolve(i);
          i.onerror = () => reject(new Error('image_load_failed'));
          i.src = url;
        });
        // Draw to canvas (some Image objects throw on direct detect)
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const detector = await getDetector();
        const result = detector.detect(canvas);
        return result.detections.length > 0;
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    // ============ Step 2: selfies — file → face-check → save ============
    async function handleSelfieFile(slotIdx, file) {
      clearErr(2);
      if (!file.type.startsWith('image/')) return showErr(2, 'That file is not an image.');
      setBusy(2, true, 'Checking for a face…');
      const card = document.querySelector(`.mf-selfie-card[data-slot="${slotIdx}"]`);
      const stage = card.querySelector(`[data-stage="${slotIdx}"]`);
      const url = URL.createObjectURL(file);
      stage.innerHTML = `<img class="mf-saved-img" src="${url}" alt="selfie ${slotIdx + 1}" /><span class="mf-selfie-num">${slotIdx + 1}</span>`;
      try {
        const ok = await detectFaceInBlob(file);
        if (!ok) {
          setBusy(2, false);
          stage.innerHTML = `<span class="mf-stage-icon">📷</span><span class="mf-selfie-num">${slotIdx + 1}</span>`;
          return showErr(2, `Selfie ${slotIdx + 1}: no face detected. Take a clear front-facing photo.`);
        }
        captured[`selfie_${slotIdx}`] = file;
        card.querySelector(`[data-actions="${slotIdx}"]`).hidden = true;
        card.querySelector(`[data-retake="${slotIdx}"]`).hidden = false;
        setBusy(2, false);
      } catch (err) {
        setBusy(2, false);
        showErr(2, 'Could not read that photo. Try another.');
        stage.innerHTML = `<span class="mf-stage-icon">📷</span><span class="mf-selfie-num">${slotIdx + 1}</span>`;
      }
    }
    function resetSelfie(slotIdx) {
      captured[`selfie_${slotIdx}`] = null;
      const card = document.querySelector(`.mf-selfie-card[data-slot="${slotIdx}"]`);
      const stage = card.querySelector(`[data-stage="${slotIdx}"]`);
      stage.innerHTML = `<span class="mf-stage-icon">📷</span><span class="mf-selfie-num">${slotIdx + 1}</span>`;
      card.querySelector(`[data-actions="${slotIdx}"]`).hidden = false;
      card.querySelector(`[data-retake="${slotIdx}"]`).hidden = true;
    }

    document.querySelectorAll('[data-take]').forEach((b) => {
      b.addEventListener('click', () => document.querySelector(`input[data-camera-input="${b.dataset.take}"]`).click());
    });
    document.querySelectorAll('[data-upload]').forEach((b) => {
      b.addEventListener('click', () => document.querySelector(`input[data-upload-input="${b.dataset.upload}"]`).click());
    });
    document.querySelectorAll('input[data-camera-input], input[data-upload-input]').forEach((input) => {
      input.addEventListener('change', () => {
        const slot = Number(input.dataset.cameraInput ?? input.dataset.uploadInput);
        const f = input.files && input.files[0];
        input.value = '';
        if (f) handleSelfieFile(slot, f);
      });
    });
    document.querySelectorAll('[data-retake]').forEach((b) => b.addEventListener('click', () => resetSelfie(Number(b.dataset.retake))));

    // ============ Step validation + submit ============
    document.querySelector('[data-action="next-1"]').addEventListener('click', () => {
      clearErr(1);
      const handle = document.getElementById('mf-handle').value.trim().toLowerCase();
      const email = document.getElementById('mf-email').value.trim();
      const pw = pwInput.value;
      const gender = (document.querySelector('input[name="gender"]:checked') || {}).value;
      if (!/^[a-z0-9]{2,20}$/.test(handle)) return showErr(1, 'Handle: 2-20 lowercase letters or numbers.');
      if (!/^\S+@\S+\.\S+$/.test(email)) return showErr(1, 'That email looks off.');
      if (pw.length < 8) return showErr(1, 'Password must be at least 8 characters.');
      if (gender !== 'm' && gender !== 'f') return showErr(1, 'Pick male or female.');
      showStep(2);
    });
    document.querySelector('[data-action="next-2"]').addEventListener('click', () => {
      clearErr(2);
      if (!captured.selfie_0 || !captured.selfie_1) return showErr(2, 'Both selfies need a verified face.');
      showStep(3);
    });

    const ERR = {
      invalid_handle: 'Handle must be 2-20 lowercase letters/numbers.',
      reserved_handle: 'That handle is reserved. Pick another.',
      invalid_email: 'That email looks off.',
      weak_password: 'Password must be at least 8 characters.',
      invalid_gender: 'Go back and pick male or female.',
      consent_required: 'You need to confirm both the age and Terms boxes.',
      need_at_least_one_selfie: 'Go back and save both selfies.',
      invalid_image_type: 'One of the selfies is not a supported image.',
      selfie_too_large: 'Selfie too large (max 8 MB).',
      handle_or_email_taken: 'That handle or email is already in use.',
      rate_limited: 'Too many signups from this IP — try in a minute.',
      user_cap_reached: 'We are full while testing. Try again later.',
      expected_multipart: 'Bad form submission — try refreshing.',
    };
    async function runProgressUntilReady() {
      // Hide form + step dots, swap in the progress screen.
      form.hidden = true;
      progress.hidden = true;
      const screen = document.getElementById('mf-progress-screen');
      const fill = document.getElementById('mf-progress-fill');
      const pctEl = document.getElementById('mf-progress-pct');
      screen.hidden = false;
      window.scrollTo({ top: 0 });

      // Estimated total time: ~3 min on the RTX A6000 community pod.
      // Bar fills smoothly to 95% over this window. If the swap takes longer,
      // we cap at 95% and keep polling. If it's faster, we jump to 100% on
      // detection.
      const TARGET_SECONDS = 180;
      const startTime = Date.now();
      let pct = 0;
      let ready = false;
      let readyPiece = null;

      const tick = setInterval(() => {
        if (ready) return;
        const elapsed = (Date.now() - startTime) / 1000;
        pct = Math.min(95, (elapsed / TARGET_SECONDS) * 95);
        fill.style.width = pct.toFixed(1) + '%';
        pctEl.textContent = Math.round(pct) + '%';
      }, 100);

      // Poll the feed every 5s until at least one piece is ready. If the pod
      // reports a failed swap or 10 minutes elapse with no ready piece, we
      // jump to the feed anyway — the feed handles 'processing'/'failed'
      // status cards on its own.
      const MAX_WAIT_MS = 600000;
      while (!ready) {
        await new Promise((r) => setTimeout(r, 5000));
        if (Date.now() - startTime > MAX_WAIT_MS) break;
        try {
          const res = await fetch(`${API}/api/feed`, { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            const pieces = data.pieces || [];
            const found = pieces.find((p) => p.status === 'ready');
            if (found) { readyPiece = found; ready = true; break; }
            // If every piece is in a terminal-failed state, stop waiting.
            if (pieces.length > 0 && pieces.every((p) => p.status === 'failed')) break;
          }
        } catch (_) { /* keep polling */ }
      }

      // Preload the rendered video into HTTP cache so the feed opens with it
      // already buffered. Swallow errors — worst case the feed fetches it on
      // its own when app.html mounts.
      if (readyPiece && readyPiece.file_url) {
        pctEl.textContent = 'Loading video…';
        try {
          const r = await fetch(`${API}${readyPiece.file_url}`, { credentials: 'include' });
          if (r.ok) await r.blob();
        } catch (_) {}
      }

      // Animate to 100% over 0.6s before redirect so the bar reads true.
      clearInterval(tick);
      const startPct = pct;
      const t0 = Date.now();
      await new Promise((resolve) => {
        const fi = setInterval(() => {
          const t = Math.min(1, (Date.now() - t0) / 600);
          const v = startPct + (100 - startPct) * t;
          fill.style.width = v.toFixed(1) + '%';
          pctEl.textContent = Math.round(v) + '%';
          if (t >= 1) { clearInterval(fi); resolve(); }
        }, 30);
      });
    }

    function setSubmitStage(msg) {
      submitBtn.textContent = msg;
      const el = document.getElementById('mf-err-3');
      el.hidden = false;
      el.style.color = '#9aa';
      el.textContent = msg;
    }
    function clearSubmitStage() {
      const el = document.getElementById('mf-err-3');
      el.style.color = '';
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErr(3);
      clearSubmitStage();
      if (!document.getElementById('mf-consent-age').checked || !document.getElementById('mf-consent-terms').checked) {
        return showErr(3, 'You need to confirm both boxes.');
      }
      if (!captured.selfie_0 || !captured.selfie_1) return showErr(3, 'Go back to step 2 and add both selfies.');

      submitBtn.disabled = true;
      setSubmitStage('Packing your photos…');
      try {
        const fd = new FormData();
        fd.set('handle', document.getElementById('mf-handle').value.trim().toLowerCase());
        fd.set('email', document.getElementById('mf-email').value.trim().toLowerCase());
        fd.set('password', pwInput.value);
        fd.set('gender', (document.querySelector('input[name="gender"]:checked') || {}).value || '');
        fd.set('consent_age', 'true');
        fd.set('consent_terms', 'true');
        fd.append('selfie_0', captured.selfie_0, 'selfie_0.jpg');
        fd.append('selfie_1', captured.selfie_1, 'selfie_1.jpg');

        setSubmitStage('Uploading to Mainfeed…');
        const ctrl = new AbortController();
        const killer = setTimeout(() => ctrl.abort(), 90000);
        let res;
        try {
          res = await fetch(`${API}/api/signup`, {
            method: 'POST',
            body: fd,
            credentials: 'include',
            signal: ctrl.signal,
          });
        } finally {
          clearTimeout(killer);
        }
        setSubmitStage('Server is processing…');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          clearSubmitStage();
          showErr(3, ERR[data.error] || `Signup failed (${data.error || res.status}). Tap to retry.`);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create my Mainfeed';
          return;
        }
        // Account is created and welcome-video swap is queued on the pod.
        // Show the progress screen, poll until the piece is ready, preload
        // the video file into HTTP cache, then redirect so the feed opens
        // with the video already buffered.
        await runProgressUntilReady();
        location.href = '/app.html';
      } catch (err) {
        clearSubmitStage();
        const isAbort = err && (err.name === 'AbortError' || /aborted/i.test(String(err.message || '')));
        const msg = isAbort
          ? 'Upload timed out after 90s — your connection or our server is slow. Tap Create my Mainfeed to retry.'
          : `Network error (${(err && err.message) || 'unknown'}). Check your connection and tap Create my Mainfeed to retry.`;
        showErr(3, msg);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create my Mainfeed';
      }
    });

    // Warm up the face detector while the user is on step 1
    getDetector().catch(() => {});
  </script>
</body>
</html>
